<!doctype html>
<html lang="en" class="h-full">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="color-scheme" content="light dark" />
    <meta name="theme-color" content="#0b0b0f" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#fbfbfd" media="(prefers-color-scheme: light)" />
    <meta
      name="description"
      content="Capsule — local-first, no-auth LLM context-pack library. Build reusable context bundles and deploy them as structured prompts."
    />
    <title>Capsule</title>
    <script>
      // Theme boot: avoid FOUC by reading saved pref before React mounts.
      (function () {
        try {
          var saved = localStorage.getItem('capsule:theme');
          var mql = window.matchMedia('(prefers-color-scheme: dark)');
          var theme = saved || (mql.matches ? 'dark' : 'light');
          if (theme === 'dark') document.documentElement.classList.add('dark');
        } catch (_) {
          /* ignore */
        }
      })();
    </script>
  </head>
  <body class="h-full bg-bg text-fg antialiased">
    <div id="root" class="h-full"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
